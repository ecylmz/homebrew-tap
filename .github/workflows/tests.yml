name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Python tests
        run: python3 -m unittest discover tests
      - name: Check Ruby syntax
        run: |
          for formula in Formula/*.rb; do
            ruby -c "$formula"
          done
